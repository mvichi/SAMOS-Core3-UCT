name: samos-core3
channels:
  - conda-forge
dependencies:
  # Core
  - python=3.11
  - pip

  # Scientific stack
  - numpy
  - scipy
  - pandas
  - xarray
  - dask
  - bottleneck

  # Plotting & visualization
  - matplotlib
  - cartopy
  - seaborn

  # Geospatial & mapping
  - shapely
  - pyproj
  - geos
  - proj
  - geopy

  # Ocean & climate data formats
  - netcdf4
  - h5netcdf
  - hdf5
  - cfgrib
  - cftime

  # Time & interpolation
  - pandas
  - scipy
  - pyinterp

  # Jupyter & workflow
  - jupyterlab
  - ipykernel

  # Revision control
  - git
  - jupyterlab_git

  # Pip-only packages
  - pip:
      - cmap